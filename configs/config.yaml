project:
  name: Climate Evidence GraphRAG Agent
  domain: climate_policy_sustainability_climate_ai
  random_seed: 42

paths:
  pdf_dir: data/pdfs
  metadata_csv: data/metadata/papers_metadata_template.csv
  gold_qa: data/gold/gold_qa_set_template.json

chunking:
  chunk_size: 600
  chunk_overlap: 80

embedding:
  model_name: BAAI/bge-small-en-v1.5
  vector_size: 384

retrieval:
  top_k: 5
  bm25_weight: 0.5
  dense_weight: 0.5

graphrag:
  # D3 exact-chunk improvement:
  # Search a deeper hybrid pool, then rerank extra chunks from likely
  # source documents before final MMR context selection.
  max_graph_chunks: 8
  max_hybrid_chunks: 8
  graph_weight: 0.4
  hybrid_weight: 0.6
  mmr_lambda: 0.9
  candidate_doc_count: 5
  chunks_per_candidate_doc: 20
  cosine_threshold: 0.25
  fallback_to_hybrid: true

neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: climate123

mongodb:
  uri: mongodb://localhost:27017
  database: climate_agent

qdrant:
  url: http://localhost:6333
  collection: climate_chunks
