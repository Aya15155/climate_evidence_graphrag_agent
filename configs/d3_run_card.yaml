deliverable: D3
name: graphrag_evaluation_safety_peft_final_scope
status: finalized_for_submission
scope_note: >
  D3 includes GraphRAG executor, evaluation, safety, adaptive retrieval, and the
  merged final-scope items that were previously planned as D4: PEFT/QLoRA tuning,
  tuning latency, final demo evidence, and retrieval latency/cache evidence.
  No separate D4 submission folder is required.

runtime_policy:
  gemini_execution: optional
  final_stable_mode: >
    Do not rerun Gemini-heavy cells unless quota is available. Existing outputs are
    saved. Rana's notebook and graphrag_executor.py fall back to grounded mock prompt
    output if Gemini answer generation fails.
  neo4j: >
    Neo4j Aura credentials are loaded from local .env. The graph was populated with
    552 nodes and 15 D3 gold-derived Finding nodes during final audit.

